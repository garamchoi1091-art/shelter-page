<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>애착유형 검사</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@400;600;700&family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
:root{--bg:#09090f;--bg2:#12121a;--bg3:#1a1a24;--border:rgba(255,255,255,0.07);--border2:rgba(255,255,255,0.16);--text:#f0eefa;--text2:#9490b0;--text3:#4e4c65;--r:13px}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{font-family:'Noto Sans KR',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden}
body::before{content:'';position:fixed;inset:0;background:radial-gradient(ellipse at 20% 40%,rgba(16,185,129,0.06) 0%,transparent 55%),radial-gradient(ellipse at 80% 70%,rgba(244,63,94,0.05) 0%,transparent 55%);pointer-events:none;z-index:0}
body::after{content:'';position:fixed;inset:0;background-image:linear-gradient(rgba(244,63,94,0.02) 1px,transparent 1px),linear-gradient(90deg,rgba(244,63,94,0.02) 1px,transparent 1px);background-size:52px 52px;pointer-events:none;z-index:0}
.screen{display:none;position:relative;z-index:1}
.screen.active{display:flex;flex-direction:column;min-height:100vh}
@keyframes fadeUp{from{opacity:0;transform:translateY(22px)}to{opacity:1;transform:translateY(0)}}
@keyframes cardIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
#intro{align-items:center;justify-content:center;padding:2.5rem 1.5rem}
.intro-inner{max-width:500px;width:100%;animation:fadeUp 0.8s ease both;text-align:center}
.att-emblem{width:88px;height:88px;border-radius:50%;margin:0 auto 1.5rem;position:relative;display:flex;align-items:center;justify-content:center}
.att-emblem::before{content:'';position:absolute;inset:0;border-radius:50%;background:conic-gradient(#10b981 0deg 90deg,#f59e0b 90deg 180deg,#6366f1 180deg 270deg,#f43f5e 270deg 360deg);opacity:.85}
.att-emblem::after{content:'';position:absolute;width:58px;height:58px;border-radius:50%;background:var(--bg)}
.att-emblem span{position:relative;z-index:1;font-size:22px}
.intro-heading{font-family:'Noto Serif KR',serif;font-size:28px;font-weight:700;line-height:1.3;margin-bottom:.5rem}
.intro-heading em{font-style:normal;background:linear-gradient(135deg,#10b981,#f59e0b);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.intro-sub{font-size:14px;color:var(--text2);margin-bottom:1.75rem;line-height:1.75}
.type-chips{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:1.75rem}
.type-chip{background:var(--bg2);border:1px solid var(--border);border-radius:10px;padding:10px 14px;text-align:left}
.type-chip-dot{width:8px;height:8px;border-radius:50%;display:inline-block;margin-right:6px;vertical-align:middle}
.type-chip-name{font-size:13px;font-weight:500;color:var(--text)}
.type-chip-desc{font-size:11px;color:var(--text3);margin-top:3px;line-height:1.4}
.info-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);padding:1.25rem 1.5rem;margin-bottom:1.75rem;text-align:left}
.info-card p{font-size:13px;color:var(--text2);line-height:1.85}
.info-card strong{color:var(--text);font-weight:500}
.start-btn{display:inline-flex;align-items:center;gap:10px;padding:14px 42px;border-radius:999px;background:linear-gradient(135deg,#e11d48,#f43f5e);color:#fff;font-size:15px;font-weight:500;border:none;cursor:pointer;font-family:inherit;box-shadow:0 0 36px rgba(244,63,94,.3);transition:transform .2s,box-shadow .2s}
.start-btn:hover{transform:translateY(-2px);box-shadow:0 0 52px rgba(244,63,94,.45)}
.quiz-header{position:sticky;top:0;z-index:10;background:rgba(9,9,15,.92);backdrop-filter:blur(18px);border-bottom:1px solid var(--border);padding:1rem 1.5rem}
.quiz-header-inner{max-width:640px;margin:0 auto;display:flex;align-items:center;gap:12px}
.q-counter{font-size:13px;color:var(--text3);white-space:nowrap;min-width:56px}
.prog-track{flex:1;height:4px;background:var(--bg3);border-radius:2px;overflow:hidden}
.prog-fill{height:100%;border-radius:2px;background:linear-gradient(90deg,#e11d48,#f59e0b);transition:width .4s cubic-bezier(.34,1.56,.64,1);width:0%}
.quiz-body{flex:1;padding:1.5rem 1.5rem 0;max-width:640px;margin:0 auto;width:100%}
.q-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);padding:1.5rem;margin-bottom:.85rem;animation:cardIn .3s ease both}
.q-num{font-size:11px;color:var(--text3);margin-bottom:6px;letter-spacing:.06em}
.q-text{font-size:15px;color:var(--text);line-height:1.65;margin-bottom:1.1rem}
.scale-row{display:flex;gap:5px}
.scale-btn{flex:1;padding:10px 3px;border-radius:8px;border:1px solid var(--border);background:var(--bg3);color:var(--text3);font-size:11px;cursor:pointer;transition:all .15s;text-align:center;font-family:inherit;display:flex;flex-direction:column;align-items:center;gap:3px}
.scale-btn .sn{font-size:15px;font-weight:700;color:var(--text2)}
.scale-btn .sl{font-size:9px;white-space:pre-line;line-height:1.3}
.scale-btn:hover{border-color:var(--border2);color:var(--text)}
.scale-btn.sel{border-width:2px;background:rgba(244,63,94,.13);border-color:#f43f5e;color:#f43f5e}
.scale-btn.sel .sn{color:#f43f5e}
.submit-wrap{padding:1.5rem;max-width:640px;margin:0 auto;width:100%}
.submit-btn{width:100%;padding:14px;border-radius:999px;background:linear-gradient(135deg,#e11d48,#f43f5e);color:#fff;font-size:15px;font-weight:500;border:none;cursor:pointer;font-family:inherit;box-shadow:0 0 28px rgba(244,63,94,.3);transition:transform .2s,box-shadow .2s;display:none}
.submit-btn:hover{transform:translateY(-2px)}
#result-screen{padding:1.5rem;align-items:center}
.result-inner{max-width:560px;width:100%;animation:fadeUp .6s ease both}
.result-hero{background:var(--bg2);border:1px solid var(--border);border-radius:16px;padding:2rem;margin-bottom:1.25rem;text-align:center;position:relative;overflow:hidden}
.result-hero::before{content:'';position:absolute;inset:0;background:radial-gradient(circle at 50% 0%,var(--hg,rgba(16,185,129,.15)),transparent 60%)}
.result-icon{width:76px;height:76px;border-radius:50%;display:flex;align-items:center;justify-content:center;margin:0 auto 1rem;font-size:28px;position:relative}
.result-type-name{font-family:'Noto Serif KR',serif;font-size:22px;font-weight:700;color:var(--text);margin-bottom:4px;position:relative}
.result-keyword{font-size:13px;color:var(--text2);margin-bottom:1rem;position:relative}
.result-desc{font-size:14px;color:var(--text2);line-height:1.8;position:relative}
.scores-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);padding:1.25rem 1.5rem;margin-bottom:1.25rem}
.score-row{display:flex;align-items:center;gap:8px;margin-bottom:9px}
.score-row:last-child{margin-bottom:0}
.score-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
.score-name{font-size:12px;color:var(--text2);min-width:54px}
.score-track{flex:1;height:6px;background:var(--bg3);border-radius:3px;overflow:hidden}
.score-fill{height:100%;border-radius:3px;transition:width .9s cubic-bezier(.34,1.3,.64,1)}
.score-val{font-size:11px;color:var(--text3);min-width:30px;text-align:right}
.info-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:1.25rem}
.info-box{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);padding:1rem 1.25rem}
.info-box-title{font-size:10px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;margin-bottom:8px}
.info-box-body{font-size:13px;color:var(--text2);line-height:1.75}
.rel-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);padding:1.25rem 1.5rem;margin-bottom:1.25rem}
.rel-title{font-size:11px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--text3);margin-bottom:.75rem;display:flex;align-items:center;gap:7px}
.rel-body{font-size:14px;color:var(--text2);line-height:1.85}
.action-row{display:flex;gap:10px;margin-bottom:8px}
.act-btn{flex:1;padding:12px;border-radius:999px;font-size:14px;font-weight:500;cursor:pointer;font-family:inherit;transition:all .15s}
.act-btn.sec{background:transparent;color:var(--text2);border:1px solid var(--border)}
.act-btn.pri{background:linear-gradient(135deg,#e11d48,#f43f5e);color:#fff;border:none;box-shadow:0 0 20px rgba(244,63,94,.25)}
.act-btn:hover{transform:translateY(-1px)}
.report-btn{width:100%;padding:13px;border-radius:999px;font-size:14px;font-weight:500;cursor:pointer;font-family:inherit;background:rgba(16,185,129,.1);color:#10b981;border:1px solid rgba(16,185,129,.3);transition:all .15s;display:flex;align-items:center;justify-content:center;gap:8px;margin-top:8px}
.report-btn:hover{background:rgba(16,185,129,.18);transform:translateY(-1px)}
.home-link{display:block;text-align:center;margin-top:1.5rem;font-size:13px;color:var(--text3);text-decoration:none;transition:color .15s}
.home-link:hover{color:var(--text2)}
#reportOverlay{display:none;position:fixed;inset:0;z-index:100;background:rgba(0,0,0,.88);overflow-y:auto;padding:2rem 1rem}
#reportOverlay.open{display:block}
.rp-sheet{background:#fff;color:#1a1a1a;width:100%;max-width:700px;margin:0 auto;border-radius:8px;padding:42px 52px;font-family:'Noto Sans KR',sans-serif;position:relative}
.rp-close{position:absolute;top:16px;right:20px;background:none;border:none;cursor:pointer;font-size:22px;color:#999}
.rp-close:hover{color:#333}
.rp-hdr{display:flex;justify-content:space-between;align-items:flex-end;border-bottom:2.5px solid #1a1a1a;padding-bottom:12px;margin-bottom:22px}
.rp-sup{font-size:10px;letter-spacing:.12em;text-transform:uppercase;color:#aaa;margin-bottom:2px}
.rp-ttl{font-family:'Noto Serif KR',serif;font-size:17px;font-weight:700;color:#1a1a1a}
.rp-date{font-size:11px;color:#bbb}
.rp-hero{display:flex;align-items:center;gap:20px;margin-bottom:20px}
.rp-icon{width:80px;height:80px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:28px;flex-shrink:0}
.rp-type-name{font-size:20px;font-weight:700;color:#1a1a1a;margin-bottom:3px}
.rp-keyword{font-size:12px;margin-bottom:6px}
.rp-short-desc{font-size:12px;color:#444;line-height:1.75}
.rp-sec{margin-bottom:18px}
.rp-sec-t{font-size:10px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;padding-left:8px;margin-bottom:10px}
.rp-bars{display:grid;gap:8px}
.rp-srow{display:grid;grid-template-columns:10px 56px 1fr 32px;gap:6px;align-items:center}
.rp-sdot{width:10px;height:10px;border-radius:50%}
.rp-sname{font-size:11px;color:#666}
.rp-strack{height:7px;background:#f0f0f0;border-radius:4px;overflow:hidden}
.rp-sfill{height:100%;border-radius:4px}
.rp-sval{font-size:10px;color:#aaa;text-align:right}
.rp-grid2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.rp-box{border-radius:8px;padding:12px 14px;border-left:3px solid}
.rp-box-t{font-size:10px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;margin-bottom:6px}
.rp-box-c{font-size:12px;color:#333;line-height:1.8}
.rp-text-block{font-size:12px;color:#444;line-height:1.85;border-radius:8px;padding:13px 15px}
.rp-foot{margin-top:20px;padding-top:12px;border-top:1px solid #eee;display:flex;justify-content:space-between;align-items:center}
.rp-foot-note{font-size:10px;color:#bbb;line-height:1.55}
.rp-print{padding:8px 20px;border-radius:999px;background:#e11d48;color:#fff;border:none;cursor:pointer;font-size:12px;font-family:inherit;font-weight:500}
.rp-print:hover{background:#be123c}
@media print{body *{visibility:hidden}#reportOverlay,#reportOverlay *{visibility:visible}#reportOverlay{position:static;background:none;padding:0;overflow:visible}.rp-sheet{box-shadow:none;border-radius:0;max-width:100%;padding:18mm 16mm;page-break-inside:avoid}.rp-close,.rp-print{display:none!important}}
::-webkit-scrollbar{width:5px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:var(--bg3);border-radius:3px}
@media(max-width:480px){.info-grid{grid-template-columns:1fr}.rp-grid2{grid-template-columns:1fr}.rp-sheet{padding:26px 20px}.scale-btn .sl{display:none}}
</style>
</head>
<body>
<div id="intro" class="screen active">
  <div class="intro-inner">
    <div class="att-emblem"><span>❤</span></div>
    <div class="intro-heading">애착유형<br><em>검사</em></div>
    <div class="intro-sub">관계에서 나타나는 나의 패턴을 탐색합니다</div>
    <div class="type-chips">
      <div class="type-chip"><span class="type-chip-dot" style="background:#10b981"></span><span class="type-chip-name">안정형</span><div class="type-chip-desc">건강한 연결과 독립의 균형</div></div>
      <div class="type-chip"><span class="type-chip-dot" style="background:#f59e0b"></span><span class="type-chip-name">불안형</span><div class="type-chip-desc">연결을 갈망하나 불안이 높음</div></div>
      <div class="type-chip"><span class="type-chip-dot" style="background:#6366f1"></span><span class="type-chip-name">회피형</span><div class="type-chip-desc">친밀감에서 거리를 두는 경향</div></div>
      <div class="type-chip"><span class="type-chip-dot" style="background:#f43f5e"></span><span class="type-chip-name">혼합형</span><div class="type-chip-desc">가까워지고 싶으나 두렵기도 함</div></div>
    </div>
    <div class="info-card"><p><strong>16문항</strong>으로 나의 애착유형을 파악합니다.<br><br>각 문항을 읽고 <strong>평소 관계에서 자신과 얼마나 일치하는지</strong> 1~5점으로 평가해 주세요.<br><br>소요시간: <strong>약 3~4분</strong></p></div>
    <button class="start-btn" onclick="startQuiz()">검사 시작하기 <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M5 12h14M12 5l7 7-7 7"/></svg></button>
    <a href="index.html" class="home-link">← 검사 목록으로</a>
  </div>
</div>
<div id="quiz-screen" class="screen">
  <div class="quiz-header"><div class="quiz-header-inner"><span class="q-counter" id="qCounter">0 / 16</span><div class="prog-track"><div class="prog-fill" id="progFill"></div></div></div></div>
  <div class="quiz-body" id="quizBody"></div>
  <div class="submit-wrap"><button class="submit-btn" id="submitBtn" onclick="showResult()">결과 확인하기 →</button></div>
</div>
<div id="result-screen" class="screen"><div class="result-inner" id="resultInner"></div></div>
<div id="reportOverlay"><div class="rp-sheet"><button class="rp-close" onclick="closeReport()">✕</button><div id="reportContent"></div></div></div>
<script>
const Qs=[
  {t:'S', q:'나는 관계에서 가까워지는 것이 편안하고 자연스럽다.'},
  {t:'AX',q:'상대방이 나를 충분히 사랑하지 않는다는 걱정이 자주 든다.'},
  {t:'AV',q:'나는 타인과 너무 가까워지면 불편하거나 숨이 막히는 느낌이 든다.'},
  {t:'D', q:'나는 누군가와 가까워지고 싶으면서도, 동시에 그것이 두렵다.'},
  {t:'S', q:'나는 필요할 때 상대에게 의지할 수 있고, 상대도 내게 기댈 수 있다고 느낀다.'},
  {t:'AX',q:'관계에서 거부당하거나 버려질까 봐 두려운 마음이 종종 든다.'},
  {t:'AV',q:'나는 감정적으로 독립적이고, 타인에게 기대지 않는 것이 편하다.'},
  {t:'D', q:'친밀한 관계에서 상대를 믿고 싶지만 쉽게 신뢰가 가지 않는다.'},
  {t:'S', q:'갈등이 생겨도 관계가 회복될 수 있다는 믿음이 있다.'},
  {t:'AX',q:'상대의 작은 행동 변화에도 관계가 흔들리는 것 같아 불안하다.'},
  {t:'AV',q:'친밀한 감정을 표현하거나 받아들이는 것이 어색하고 불편하다.'},
  {t:'D', q:'나는 관계에서 상처받을까 봐 먼저 거리를 두는 경향이 있다.'},
  {t:'S', q:'나는 내 감정과 상대의 감정을 균형 있게 다룰 수 있다.'},
  {t:'AX',q:'상대가 연락이 없거나 늦으면 최악의 상황을 상상하곤 한다.'},
  {t:'AV',q:'깊은 감정을 나누는 것보다 혼자만의 공간을 지키는 것이 더 중요하다.'},
  {t:'D', q:'나는 관계에서 감정 기복이 심하고, 상대를 이상화했다가 실망하는 패턴이 있다.'},
];

    b.appendChild(c);
  });

function pick(i,v,btn){
  ans[i]=v;
  btn.closest('.q-card').querySelectorAll('.scale-btn').forEach((b,bi)=>{const is=(bi+1)===v;b.className='scale-btn'+(is?' sel':'');});
  const n=Object.keys(ans).length;
  document.getElementById('qCounter').textContent=n+' / 16';
  document.getElementById('progFill').style.width=(n/16*100)+'%';
  document.getElementById('submitBtn').style.display=n===16?'block':'none';
}
function calcScores(){
  const r={S:0,AX:0,AV:0,D:0},c={S:0,AX:0,AV:0,D:0};
  Qs.forEach((q,i)=>{if(ans[i]!==undefined){r[q.t]+=ans[i];c[q.t]++;}});
  const n={};TO.forEach(t=>{n[t]=c[t]?Math.round(r[t]/c[t]/5*100):0;});return n;
}
