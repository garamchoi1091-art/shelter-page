<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>이고그램 검사</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@400;600;700&family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
:root{--bg:#08080f;--bg2:#111118;--bg3:#18181f;--border:rgba(255,255,255,0.07);--border2:rgba(255,255,255,0.15);--text:#f0eefa;--text2:#9490ae;--text3:#4e4c62;--r:13px;
  --cp:#ef4444;--np:#f97316;--a:#3b82f6;--fc:#a855f7;--ac:#10b981}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{font-family:'Noto Sans KR',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden}
body::before{content:'';position:fixed;inset:0;background:radial-gradient(ellipse at 20% 40%,rgba(59,130,246,.07) 0%,transparent 55%),radial-gradient(ellipse at 80% 70%,rgba(168,85,247,.05) 0%,transparent 55%);pointer-events:none;z-index:0}
body::after{content:'';position:fixed;inset:0;background-image:linear-gradient(rgba(59,130,246,.02) 1px,transparent 1px),linear-gradient(90deg,rgba(59,130,246,.02) 1px,transparent 1px);background-size:52px 52px;pointer-events:none;z-index:0}
.screen{display:none;position:relative;z-index:1}
.screen.active{display:flex;flex-direction:column;min-height:100vh}
@keyframes fadeUp{from{opacity:0;transform:translateY(22px)}to{opacity:1;transform:translateY(0)}}
@keyframes cardIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}

/* INTRO */
#intro{align-items:center;justify-content:center;padding:2.5rem 1.5rem}
.intro-inner{max-width:520px;width:100%;animation:fadeUp 0.8s ease both;text-align:center}
.ego-emblem{display:flex;justify-content:center;align-items:center;gap:6px;margin-bottom:1.5rem}
.ego-orb{width:38px;height:38px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;color:#fff;flex-shrink:0}
.ego-orb.cp{background:var(--cp);box-shadow:0 0 16px rgba(239,68,68,.4)}
.ego-orb.np{background:var(--np);box-shadow:0 0 16px rgba(249,115,22,.4)}
.ego-orb.a{background:var(--a);box-shadow:0 0 20px rgba(59,130,246,.5);width:50px;height:50px;font-size:14px}
.ego-orb.fc{background:var(--fc);box-shadow:0 0 16px rgba(168,85,247,.4)}
.ego-orb.ac{background:var(--ac);box-shadow:0 0 16px rgba(16,185,129,.4)}
.intro-heading{font-family:'Noto Serif KR',serif;font-size:32px;font-weight:700;line-height:1.3;margin-bottom:.5rem}
.intro-heading em{font-style:normal;background:linear-gradient(135deg,#3b82f6,#a855f7);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.intro-sub{font-size:16px;color:var(--text2);margin-bottom:1.5rem;line-height:1.75}
.ego-chips{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:1.75rem}
.ego-chip{background:var(--bg2);border:1px solid var(--border);border-radius:10px;padding:10px 14px;text-align:left;display:flex;align-items:flex-start;gap:10px}
.chip-dot{width:10px;height:10px;border-radius:50%;margin-top:3px;flex-shrink:0}
.chip-name{font-size:15px;font-weight:500;color:var(--text)}
.chip-desc{font-size:13px;color:var(--text3);margin-top:3px;line-height:1.4}
.info-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);padding:1.25rem 1.5rem;margin-bottom:1.75rem;text-align:left}
.info-card p{font-size:15px;color:var(--text2);line-height:1.85}
.info-card strong{color:var(--text);font-weight:500}
.start-btn{display:inline-flex;align-items:center;gap:10px;padding:14px 42px;border-radius:999px;background:linear-gradient(135deg,#3b82f6,#a855f7);color:#fff;font-size:15px;font-weight:500;border:none;cursor:pointer;font-family:inherit;box-shadow:0 0 36px rgba(59,130,246,.3);transition:transform .2s,box-shadow .2s}
.start-btn:hover{transform:translateY(-2px);box-shadow:0 0 52px rgba(59,130,246,.45)}

/* QUIZ */
.quiz-header{position:sticky;top:0;z-index:10;background:rgba(8,8,15,.92);backdrop-filter:blur(18px);border-bottom:1px solid var(--border);padding:1rem 1.5rem}
.quiz-header-inner{max-width:660px;margin:0 auto;display:flex;align-items:center;gap:12px}
.q-badge{font-size:11px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;padding:3px 10px;border-radius:999px;white-space:nowrap}
.q-counter{font-size:15px;color:var(--text3);margin-left:auto;white-space:nowrap}
.prog-track{flex:1;height:4px;background:var(--bg3);border-radius:2px;overflow:hidden}
.prog-fill{height:100%;border-radius:2px;background:linear-gradient(90deg,#3b82f6,#a855f7);transition:width .4s ease;width:0%}
.quiz-body{flex:1;padding:1.5rem 1.5rem 0;max-width:660px;margin:0 auto;width:100%}
.q-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);padding:1.5rem;margin-bottom:.85rem;animation:cardIn .3s ease both}
.q-num{font-size:13px;color:var(--text3);margin-bottom:6px;letter-spacing:.06em}
.q-text{font-size:17px;color:var(--text);line-height:1.7;margin-bottom:1.1rem}
.scale-row{display:flex;gap:5px}
.scale-btn{flex:1;padding:10px 3px;border-radius:8px;border:1px solid var(--border);background:var(--bg3);color:var(--text3);font-size:11px;cursor:pointer;transition:all .15s;text-align:center;font-family:inherit;display:flex;flex-direction:column;align-items:center;gap:3px}
.scale-btn .sn{font-size:17px;font-weight:700;color:var(--text2)}
.scale-btn .sl{font-size:11px;white-space:pre-line;line-height:1.3}
.scale-btn:hover{border-color:var(--border2);color:var(--text)}
.scale-btn.sel{border-width:2px}
.submit-wrap{padding:1.5rem;max-width:660px;margin:0 auto;width:100%}
.submit-btn{width:100%;padding:16px;border-radius:999px;background:linear-gradient(135deg,#3b82f6,#a855f7);color:#fff;font-size:15px;font-weight:500;border:none;cursor:pointer;font-family:inherit;box-shadow:0 0 28px rgba(59,130,246,.3);transition:transform .2s;display:none}
.submit-btn:hover{transform:translateY(-2px)}

/* RESULT (form only) */
#result-screen{padding:1.5rem;align-items:center}
.result-inner{max-width:480px;width:100%;animation:fadeUp .6s ease both}

::-webkit-scrollbar{width:5px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:var(--bg3);border-radius:3px}
@media(max-width:480px){.scale-btn .sl{display:none}.ego-chips{grid-template-columns:1fr}}
</style>
</head>
<body>

<!-- INTRO -->
<div id="intro" class="screen active">
  <div class="intro-inner">
    <div class="ego-emblem">
      <div class="ego-orb cp">CP</div>
      <div class="ego-orb np">NP</div>
      <div class="ego-orb a">A</div>
      <div class="ego-orb fc">FC</div>
      <div class="ego-orb ac">AC</div>
    </div>
    <div class="intro-heading">이고그램<br><em>자아상태 검사</em></div>
    <div class="intro-sub">교류분석(TA) 이론 기반 · 5가지 자아상태 측정</div>
    <div class="ego-chips">
      <div class="ego-chip"><div class="chip-dot" style="background:var(--cp)"></div><div><div class="chip-name">CP · 비판적 부모</div><div class="chip-desc">원칙·책임·도덕성</div></div></div>
      <div class="ego-chip"><div class="chip-dot" style="background:var(--np)"></div><div><div class="chip-name">NP · 양육적 부모</div><div class="chip-desc">배려·공감·보살핌</div></div></div>
      <div class="ego-chip"><div class="chip-dot" style="background:var(--a)"></div><div><div class="chip-name">A · 어른</div><div class="chip-desc">논리·현실·객관성</div></div></div>
      <div class="ego-chip"><div class="chip-dot" style="background:var(--fc)"></div><div><div class="chip-name">FC · 자유로운 아이</div><div class="chip-desc">창의·자발·감정표현</div></div></div>
      <div class="ego-chip" style="grid-column:1/-1;max-width:260px;margin:0 auto"><div class="chip-dot" style="background:var(--ac)"></div><div><div class="chip-name">AC · 순응하는 아이</div><div class="chip-desc">타협·눈치·배려</div></div></div>
    </div>
    <div class="info-card"><p><strong>25문항</strong>으로 5가지 자아상태를 측정합니다.<br><br>각 문항을 읽고 <strong>평소 자신과 얼마나 일치하는지</strong><br>1(전혀 아님) ~ 5(매우 그러함)으로 응답해 주세요.<br><br>소요시간: <strong>약 3~5분</strong></p></div>
    <button class="start-btn" onclick="startQuiz()">검사 시작하기 <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M5 12h14M12 5l7 7-7 7"/></svg></button>
  </div>
</div>

<!-- QUIZ -->
<div id="quiz-screen" class="screen">
  <div class="quiz-header">
    <div class="quiz-header-inner">
      <span class="q-badge" id="qBadge">CP</span>
      <div class="prog-track"><div class="prog-fill" id="progFill"></div></div>
      <span class="q-counter" id="qCounter">0 / 25</span>
    </div>
  </div>
  <div class="quiz-body" id="quizBody"></div>
  <div class="submit-wrap"><button class="submit-btn" id="submitBtn" onclick="showResult()">결과 확인하기 →</button></div>
</div>

<!-- RESULT -->
<div id="result-screen" class="screen">
  <div class="result-inner" id="resultInner"></div>
</div>

<script>
/* ══════════════════════════════════════
   25문항: CP×5, NP×5, A×5, FC×5, AC×5
══════════════════════════════════════ */
const Qs = [
  /* CP */
  {e:'CP',c:'#ef4444',q:'잘못된 일을 보면 반드시 지적해야 직성이 풀린다.'},
  {e:'CP',c:'#ef4444',q:'규칙과 원칙은 어떤 상황에서도 지켜야 한다고 생각한다.'},
  {e:'CP',c:'#ef4444',q:'다른 사람이 책임을 소홀히 하면 화가 나거나 답답하다.'},
  {e:'CP',c:'#ef4444',q:'도덕적으로 옳고 그름을 분명하게 구분하는 편이다.'},
  {e:'CP',c:'#ef4444',q:'완벽하게 하지 않으면 의미가 없다는 생각이 자주 든다.'},
  /* NP */
  {e:'NP',c:'#f97316',q:'주변에 힘들어 보이는 사람이 있으면 먼저 다가가 돕고 싶다.'},
  {e:'NP',c:'#f97316',q:'상대방이 실수해도 너그럽게 이해하고 격려하는 편이다.'},
  {e:'NP',c:'#f97316',q:'다른 사람의 이야기를 끝까지 잘 들어주는 편이다.'},
  {e:'NP',c:'#f97316',q:'칭찬과 격려의 말을 자연스럽게 하는 편이다.'},
  {e:'NP',c:'#f97316',q:'다른 사람을 돌보고 챙기는 일에서 보람을 느낀다.'},
  /* A */
  {e:'A', c:'#3b82f6',q:'중요한 결정을 내릴 때 감정보다 사실과 논리를 우선한다.'},
  {e:'A', c:'#3b82f6',q:'문제가 생기면 원인을 파악하고 차분하게 해결책을 찾는다.'},
  {e:'A', c:'#3b82f6',q:'정보를 충분히 확인한 뒤 판단하는 편이다.'},
  {e:'A', c:'#3b82f6',q:'감정적으로 반응하기보다 상황을 객관적으로 분석하려 한다.'},
  {e:'A', c:'#3b82f6',q:'장단점을 따져보고 합리적인 선택을 하려고 노력한다.'},
  /* FC */
  {e:'FC',c:'#a855f7',q:'하고 싶은 것이 생기면 충동적으로 바로 시도하는 편이다.'},
  {e:'FC',c:'#a855f7',q:'감정을 솔직하게 표현하는 편이고, 기쁠 때 크게 기뻐한다.'},
  {e:'FC',c:'#a855f7',q:'새롭고 창의적인 아이디어를 생각하는 것을 즐긴다.'},
  {e:'FC',c:'#a855f7',q:'유머 감각이 있고 분위기를 유쾌하게 만드는 편이다.'},
  {e:'FC',c:'#a855f7',q:'규칙이나 형식보다 자유롭고 자발적인 것을 좋아한다.'},
  /* AC */
  {e:'AC',c:'#10b981',q:'다른 사람의 기분이나 반응이 신경 쓰여 말을 조심하는 편이다.'},
  {e:'AC',c:'#10b981',q:'갈등을 피하기 위해 내 의견을 굽히거나 참는 경우가 많다.'},
  {e:'AC',c:'#10b981',q:'상대방이 원하는 것을 먼저 파악하고 맞추려 노력한다.'},
  {e:'AC',c:'#10b981',q:'"안 된다"고 거절하는 것이 어렵고 불편하다.'},
  {e:'AC',c:'#10b981',q:'칭찬을 받으면 기쁘고 비판을 받으면 오래 신경이 쓰인다.'},
];

const EGO = ['CP','NP','A','FC','AC'];
const EGO_COLORS = {CP:'#ef4444',NP:'#f97316',A:'#3b82f6',FC:'#a855f7',AC:'#10b981'};
const EGO_NAMES  = {CP:'비판적 부모',NP:'양육적 부모',A:'어른',FC:'자유로운 아이',AC:'순응하는 아이'};
const EGO_DESC = {
  CP:{
    high:'원칙과 도덕을 중시하고 책임감이 강합니다. 리더십이 있으나 지나치면 비판적·권위적으로 느껴질 수 있습니다.',
    low:'규칙에 얽매이지 않고 유연하나, 때로 책임감이나 도덕적 기준이 약하게 보일 수 있습니다.',
    traits:['원칙 준수','높은 기준','도덕적 판단','책임 강조','완벽주의'],
    growth:'비판보다 격려를 먼저 시도해보세요. "어떻게 하면 더 잘할 수 있을까?"라는 질문이 관계를 부드럽게 합니다.'
  },
  NP:{
    high:'따뜻하고 배려심이 깊으며 타인을 잘 돌봅니다. 지나치면 과보호나 자기 희생으로 이어질 수 있습니다.',
    low:'자신의 일을 우선하는 편입니다. 타인에 대한 감정적 지지를 의식적으로 늘려보는 것이 도움이 됩니다.',
    traits:['따뜻한 배려','공감 능력','격려와 지지','보살핌','헌신'],
    growth:'자신을 돌보는 것도 타인을 돌보는 것만큼 중요합니다. 건강한 경계를 지키면서 배려하세요.'
  },
  A:{
    high:'논리적이고 객관적이며 현실적입니다. 감정보다 사실을 우선하는 성숙한 판단력이 강점입니다.',
    low:'즉흥적이거나 감정적인 판단을 내리기 쉽습니다. 중요한 결정 전 잠깐 멈추고 데이터를 확인하는 습관이 도움됩니다.',
    traits:['논리적 분석','객관적 판단','현실 감각','데이터 기반','문제 해결'],
    growth:'어른 자아가 강하면 차갑게 느껴질 수 있습니다. 감정을 인정하는 말 한마디가 관계를 따뜻하게 합니다.'
  },
  FC:{
    high:'자유롭고 창의적이며 감정을 솔직하게 표현합니다. 지나치면 충동적이거나 타인을 배려하지 못할 수 있습니다.',
    low:'감정 표현이 억제되어 있습니다. 자신의 감정을 안전하게 표현하는 연습이 활력을 줄 수 있습니다.',
    traits:['자유로운 표현','창의성','즉흥성','유머','감정 솔직함'],
    growth:'자유로운 에너지를 유지하되 상황을 읽는 눈도 함께 키워가세요. 창의성과 책임감의 균형이 강점을 극대화합니다.'
  },
  AC:{
    high:'타인의 기대에 민감하고 조화를 중시합니다. 지나치면 자신의 욕구를 억압하거나 소진될 수 있습니다.',
    low:'타인의 눈치를 덜 보고 자기주장이 강한 편입니다. 관계에서 상대의 감정을 배려하는 연습이 도움이 됩니다.',
    traits:['타인 배려','갈등 회피','협조','눈치','인내'],
    growth:'자신의 감정과 욕구도 소중합니다. "아니오"라고 말하는 연습을 조금씩 해나가면 자아 존중감이 높아집니다.'
  },
};

const SL = ['전혀\n아님','아닌\n편','보통','그런\n편','매우\n그러함'];
const ans = {};
window._egoResult = null;

function startQuiz(){show('quiz-screen');renderQ();}
function show(id){document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));document.getElementById(id).classList.add('active');window.scrollTo(0,0);}

function renderQ(){
  const body=document.getElementById('quizBody');body.innerHTML='';
  Qs.forEach((q,i)=>{
    const card=document.createElement('div');
    card.className='q-card';card.style.animationDelay=(i*.025)+'s';
    const s=ans[i];
    card.innerHTML=`
      <div class="q-num" style="color:${q.c}aa">${EGO_NAMES[q.e]} (${q.e}) · Q${i+1}</div>
      <div class="q-text">${q.q}</div>
      <div class="scale-row">${[1,2,3,4,5].map(v=>`
        <button class="scale-btn${s===v?' sel':''}"
          style="${s===v?`background:${q.c}22;border-color:${q.c};color:${q.c}`:''}"
          onclick="pick(${i},${v},this,'${q.c}')">
          <span class="sn">${v}</span><span class="sl">${SL[v-1]}</span>
        </button>`).join('')}</div>`;
    body.appendChild(card);
  });
}

function pick(i,v,btn,color){
  ans[i]=v;
  btn.closest('.q-card').querySelectorAll('.scale-btn').forEach((b,bi)=>{
    const is=(bi+1)===v;
    b.className='scale-btn'+(is?' sel':'');
    b.style=is?`background:${color}22;border-color:${color};color:${color}`:'';
  });
  const n=Object.keys(ans).length;
  document.getElementById('progFill').style.width=(n/25*100)+'%';
  document.getElementById('qCounter').textContent=n+' / 25';
  const cur=Qs[i];
  const badge=document.getElementById('qBadge');
  badge.textContent=cur.e+' · '+EGO_NAMES[cur.e];
  badge.style.background=cur.c+'22';badge.style.color=cur.c;badge.style.border='1px solid '+cur.c+'44';
  document.getElementById('submitBtn').style.display=n===25?'block':'none';
}

function calcScores(){
  const raw={CP:0,NP:0,A:0,FC:0,AC:0};
  const cnt={CP:0,NP:0,A:0,FC:0,AC:0};
  Qs.forEach((q,i)=>{if(ans[i]!==undefined){raw[q.e]+=ans[i];cnt[q.e]++;}});
  const pct={};
  EGO.forEach(e=>{pct[e]=cnt[e]?Math.round(raw[e]/cnt[e]/5*100):0;});
  return pct;
}

function getDominant(pct){
  return EGO.slice().sort((a,b)=>pct[b]-pct[a])[0];
}
