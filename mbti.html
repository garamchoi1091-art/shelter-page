<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MBTI 성격유형 검사</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@400;600;700&family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0e0e11;
    --bg2: #16161c;
    --bg3: #1e1e27;
    --border: rgba(255,255,255,0.08);
    --border-hover: rgba(255,255,255,0.18);
    --text: #f0eff4;
    --text2: #9896a8;
    --text3: #5c5a6e;
    --accent: #a78bfa;
    --accent2: #7c3aed;
    --teal: #2dd4bf;
    --coral: #fb7185;
    --amber: #fbbf24;
    --green: #4ade80;
    --r: 12px;
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html { scroll-behavior: smooth; }
  body {
    font-family: 'Noto Sans KR', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* BG grid */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(167,139,250,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(167,139,250,0.03) 1px, transparent 1px);
    background-size: 48px 48px;
    pointer-events: none;
    z-index: 0;
  }

  .glow {
    position: fixed;
    width: 600px; height: 600px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(124,58,237,0.12) 0%, transparent 70%);
    top: -200px; right: -200px;
    pointer-events: none; z-index: 0;
    animation: glowMove 8s ease-in-out infinite alternate;
  }
  @keyframes glowMove { to { transform: translate(-60px, 80px); } }

  /* SCREENS */
  .screen { display: none; position: relative; z-index: 1; }
  .screen.active { display: flex; flex-direction: column; min-height: 100vh; }

  /* ── INTRO ── */
  #intro {
    align-items: center; justify-content: center;
    padding: 2rem;
    text-align: center;
  }
  .intro-inner { max-width: 480px; animation: fadeUp 0.8s ease both; }
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(24px); }
    to { opacity: 1; transform: translateY(0); }
  }
  .logo-mark {
    font-family: 'Noto Serif KR', serif;
    font-size: 64px;
    font-weight: 700;
    letter-spacing: -2px;
    background: linear-gradient(135deg, #a78bfa, #7c3aed, #2dd4bf);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    margin-bottom: 0.5rem;
    line-height: 1;
  }
  .intro-title { font-size: 18px; font-weight: 500; color: var(--text2); margin-bottom: 2rem; }
  .intro-desc {
    font-size: 14px; color: var(--text2); line-height: 1.8;
    background: var(--bg2); border: 1px solid var(--border);
    border-radius: var(--r); padding: 1.25rem 1.5rem;
    margin-bottom: 2rem; text-align: left;
  }
  .intro-desc span { color: var(--accent); font-weight: 500; }
  .start-btn {
    display: inline-flex; align-items: center; gap: 10px;
    padding: 14px 36px; border-radius: 999px;
    background: linear-gradient(135deg, #7c3aed, #a78bfa);
    color: #fff; font-size: 15px; font-weight: 500;
    border: none; cursor: pointer;
    box-shadow: 0 0 32px rgba(124,58,237,0.35);
    transition: transform 0.2s, box-shadow 0.2s;
    font-family: inherit;
  }
  .start-btn:hover { transform: translateY(-2px); box-shadow: 0 0 48px rgba(124,58,237,0.5); }
  .start-btn svg { width: 18px; height: 18px; }

  /* ── QUIZ ── */
  #quiz-screen { padding: 0; }
  .quiz-header {
    position: sticky; top: 0; z-index: 10;
    background: rgba(14,14,17,0.9);
    backdrop-filter: blur(16px);
    border-bottom: 1px solid var(--border);
    padding: 1rem 1.5rem;
  }
  .quiz-header-inner {
    max-width: 640px; margin: 0 auto;
    display: flex; align-items: center; gap: 12px;
  }
  .q-counter { font-size: 13px; color: var(--text3); white-space: nowrap; min-width: 56px; }
  .prog-track {
    flex: 1; height: 4px; background: var(--bg3);
    border-radius: 2px; overflow: hidden;
  }
  .prog-fill {
    height: 100%; border-radius: 2px;
    background: linear-gradient(90deg, #7c3aed, #2dd4bf);
    transition: width 0.4s cubic-bezier(0.34,1.56,0.64,1);
    width: 0%;
  }
  .quiz-body { flex: 1; padding: 2rem 1.5rem; max-width: 640px; margin: 0 auto; width: 100%; }

  .section-badge {
    display: inline-flex; align-items: center; gap: 6px;
    font-size: 11px; font-weight: 700; letter-spacing: 0.1em;
    text-transform: uppercase;
    padding: 4px 12px; border-radius: 999px;
    margin-bottom: 1.5rem;
  }
  .badge-EI  { background: rgba(167,139,250,0.12); color: var(--accent); border: 1px solid rgba(167,139,250,0.2); }
  .badge-SN  { background: rgba(45,212,191,0.10); color: var(--teal); border: 1px solid rgba(45,212,191,0.2); }
  .badge-TF  { background: rgba(251,113,133,0.10); color: var(--coral); border: 1px solid rgba(251,113,133,0.2); }
  .badge-JP  { background: rgba(251,191,36,0.10); color: var(--amber); border: 1px solid rgba(251,191,36,0.2); }

  .q-card {
    background: var(--bg2); border: 1px solid var(--border);
    border-radius: var(--r); padding: 1.5rem;
    margin-bottom: 1rem;
    animation: cardIn 0.35s ease both;
  }
  @keyframes cardIn {
    from { opacity:0; transform: translateY(12px); }
    to { opacity:1; transform: translateY(0); }
  }
  .q-num { font-size: 11px; color: var(--text3); margin-bottom: 8px; letter-spacing: 0.06em; }
  .q-text { font-size: 15px; color: var(--text); line-height: 1.6; margin-bottom: 1rem; }
  .opts { display: flex; flex-direction: column; gap: 8px; }
  .opt {
    padding: 12px 14px; border-radius: 8px;
    border: 1px solid var(--border);
    background: var(--bg3);
    color: var(--text2); font-size: 14px;
    cursor: pointer; transition: all 0.15s;
    text-align: left; font-family: inherit;
    line-height: 1.5;
  }
  .opt:hover { border-color: var(--border-hover); color: var(--text); background: rgba(255,255,255,0.04); }
  .opt.sel-a { background: rgba(167,139,250,0.12); border-color: rgba(167,139,250,0.4); color: var(--accent); }
  .opt.sel-b { background: rgba(45,212,191,0.10); border-color: rgba(45,212,191,0.35); color: var(--teal); }

  .submit-wrap { padding: 1.5rem 1.5rem 2rem; max-width: 640px; margin: 0 auto; width: 100%; }
  .submit-btn {
    width: 100%; padding: 14px;
    border-radius: 999px;
    background: linear-gradient(135deg, #7c3aed, #a78bfa);
    color: #fff; font-size: 15px; font-weight: 500;
    border: none; cursor: pointer;
    box-shadow: 0 0 32px rgba(124,58,237,0.3);
    transition: transform 0.2s, opacity 0.2s, box-shadow 0.2s;
    font-family: inherit; display: none;
  }
  .submit-btn:hover { transform: translateY(-2px); box-shadow: 0 0 48px rgba(124,58,237,0.45); }

  /* ── RESULT ── */
  #result-screen { padding: 2rem 1.5rem; align-items: center; }
  .result-inner { max-width: 560px; width: 100%; animation: fadeUp 0.6s ease both; }

  .result-hero {
    text-align: center;
    background: var(--bg2); border: 1px solid var(--border);
    border-radius: 16px; padding: 2.5rem 2rem 2rem;
    margin-bottom: 1.25rem;
    position: relative; overflow: hidden;
  }
  .result-hero::before {
    content: '';
    position: absolute; inset: 0;
    background: radial-gradient(circle at 50% 0%, rgba(124,58,237,0.15), transparent 60%);
  }
  .result-type {
    font-family: 'Noto Serif KR', serif;
    font-size: 64px; font-weight: 700;
    letter-spacing: 4px;
    background: linear-gradient(135deg, #a78bfa, #2dd4bf);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    line-height: 1; margin-bottom: 6px;
    position: relative;
  }
  .result-nickname { font-size: 16px; color: var(--text2); margin-bottom: 1rem; position: relative; }
  .result-desc-text { font-size: 14px; color: var(--text2); line-height: 1.8; position: relative; }

  .bars-card {
    background: var(--bg2); border: 1px solid var(--border);
    border-radius: var(--r); padding: 1.25rem 1.5rem;
    margin-bottom: 1.25rem;
  }
  .bar-section { margin-bottom: 14px; }
  .bar-section:last-child { margin-bottom: 0; }
  .bar-meta { display: flex; justify-content: space-between; margin-bottom: 6px; }
  .bar-meta span { font-size: 12px; font-weight: 500; }
  .bar-track2 { height: 6px; background: var(--bg3); border-radius: 3px; overflow: hidden; }
  .bar-fill2 { height: 100%; border-radius: 3px; transition: width 1s cubic-bezier(0.34,1.3,0.64,1); }

  .detail-card {
    background: var(--bg2); border: 1px solid var(--border);
    border-radius: var(--r); padding: 1.25rem 1.5rem;
    margin-bottom: 1.25rem;
  }
  .detail-title { font-size: 12px; font-weight: 700; letter-spacing: 0.08em; color: var(--text3); text-transform: uppercase; margin-bottom: 1rem; }
  .trait-list { display: flex; flex-wrap: wrap; gap: 6px; }
  .trait-chip {
    font-size: 12px; padding: 4px 10px; border-radius: 999px;
    background: rgba(167,139,250,0.1); color: var(--accent);
    border: 1px solid rgba(167,139,250,0.2);
  }
  .caution-list { font-size: 14px; color: var(--text2); line-height: 1.9; }
  .caution-list li { list-style: none; padding-left: 1.2em; position: relative; }
  .caution-list li::before { content: '·'; position: absolute; left: 0; color: var(--coral); }

  .compat-row { display: flex; gap: 8px; }
  .compat-chip {
    flex: 1; text-align: center; padding: 10px 8px;
    border-radius: 8px; font-size: 14px; font-weight: 600;
    background: rgba(74,222,128,0.1); color: var(--green);
    border: 1px solid rgba(74,222,128,0.2);
  }

  .action-row { display: flex; gap: 10px; margin-top: 1.5rem; }
  .action-btn {
    flex: 1; padding: 12px;
    border-radius: 999px; font-size: 14px;
    font-weight: 500; cursor: pointer; font-family: inherit;
    transition: all 0.15s;
  }
  .action-btn.primary {
    background: linear-gradient(135deg, #7c3aed, #a78bfa);
    color: #fff; border: none;
    box-shadow: 0 0 24px rgba(124,58,237,0.3);
  }
  .action-btn.secondary {
    background: transparent;
    color: var(--text2);
    border: 1px solid var(--border);
  }
  .action-btn:hover { transform: translateY(-1px); }

  /* scrollbar */
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--bg3); border-radius: 3px; }

  @media (max-width: 480px) {
    .logo-mark { font-size: 52px; }
    .result-type { font-size: 52px; }
    .compat-row { flex-wrap: wrap; }
    .compat-chip { min-width: calc(33% - 6px); }
  }

  /* ── 해석지 버튼 ── */
  .report-btn {
    width: 100%; padding: 13px;
    border-radius: 999px; font-size: 14px;
    font-weight: 500; cursor: pointer; font-family: inherit;
    margin-top: 10px;
    background: rgba(45,212,191,0.1);
    color: var(--teal);
    border: 1px solid rgba(45,212,191,0.3);
    transition: all 0.15s;
    display: flex; align-items: center; justify-content: center; gap: 8px;
  }
  .report-btn:hover { background: rgba(45,212,191,0.18); transform: translateY(-1px); }

  /* ── 해석지 모달 오버레이 ── */
  #reportOverlay {
    display: none;
    position: fixed; inset: 0; z-index: 100;
    background: rgba(0,0,0,0.85);
    overflow-y: auto;
    padding: 2rem 1rem;
  }
  #reportOverlay.open { display: block; }

  /* ── A4 해석지 (화면용) ── */
  .report-sheet {
    background: #fff;
    color: #1a1a1a;
    width: 100%;
    max-width: 680px;
    margin: 0 auto;
    border-radius: 8px;
    padding: 40px 48px;
    font-family: 'Noto Sans KR', sans-serif;
    position: relative;
  }
  .report-close {
    position: absolute; top: 16px; right: 20px;
    background: none; border: none; cursor: pointer;
    font-size: 22px; color: #888; line-height: 1;
  }
  .report-close:hover { color: #333; }

  /* 해석지 내부 스타일 */
  .rp-header { border-bottom: 2px solid #1a1a1a; padding-bottom: 14px; margin-bottom: 20px; display: flex; justify-content: space-between; align-items: flex-end; }
  .rp-title { font-family: 'Noto Serif KR', serif; font-size: 11px; color: #888; letter-spacing: 0.1em; text-transform: uppercase; }
  .rp-date { font-size: 11px; color: #aaa; }

  .rp-hero { display: flex; align-items: center; gap: 20px; margin-bottom: 22px; }
  .rp-type-box {
    width: 96px; height: 96px; border-radius: 12px;
    background: linear-gradient(135deg, #7c3aed, #2dd4bf);
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
  }
  .rp-type-text { font-family: 'Noto Serif KR', serif; font-size: 28px; font-weight: 700; color: #fff; letter-spacing: 3px; }
  .rp-hero-right {}
  .rp-nick { font-size: 18px; font-weight: 700; color: #1a1a1a; margin-bottom: 4px; }
  .rp-subdesc { font-size: 13px; color: #555; line-height: 1.7; }

  .rp-section { margin-bottom: 18px; }
  .rp-section-title {
    font-size: 10px; font-weight: 700; letter-spacing: 0.12em;
    text-transform: uppercase; color: #7c3aed;
    border-left: 3px solid #7c3aed; padding-left: 8px;
    margin-bottom: 10px;
  }

  /* 지표 막대 */
  .rp-bars { display: grid; gap: 8px; }
  .rp-bar-row { display: grid; grid-template-columns: 20px 1fr 20px; gap: 8px; align-items: center; }
  .rp-bar-label { font-size: 11px; font-weight: 700; color: #444; }
  .rp-bar-label.right { text-align: right; }
  .rp-bar-track { height: 7px; background: #eee; border-radius: 4px; overflow: hidden; }
  .rp-bar-fill { height: 100%; border-radius: 4px; }

  /* 특성 그리드 */
  .rp-grid2 { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  .rp-box { background: #f7f5ff; border-radius: 8px; padding: 12px 14px; border-left: 3px solid #a78bfa; }
  .rp-box.green { background: #f0fdf4; border-left-color: #22c55e; }
  .rp-box.coral { background: #fff1f2; border-left-color: #fb7185; }
  .rp-box-title { font-size: 10px; font-weight: 700; letter-spacing: 0.08em; color: #7c3aed; margin-bottom: 6px; }
  .rp-box.green .rp-box-title { color: #16a34a; }
  .rp-box.coral .rp-box-title { color: #e11d48; }
  .rp-box-content { font-size: 12px; color: #333; line-height: 1.75; }

  /* 선호지표 해설표 */
  .rp-dim-table { width: 100%; border-collapse: collapse; font-size: 12px; }
  .rp-dim-table th { font-size: 10px; letter-spacing: 0.08em; color: #888; font-weight: 600; padding: 4px 8px; border-bottom: 1px solid #eee; text-align: left; }
  .rp-dim-table td { padding: 7px 8px; border-bottom: 1px solid #f0f0f0; color: #333; vertical-align: top; line-height: 1.55; }
  .rp-dim-table td:first-child { font-weight: 700; color: #7c3aed; white-space: nowrap; }
  .rp-dim-table tr:last-child td { border-bottom: none; }

  .rp-compat { display: flex; gap: 8px; }
  .rp-compat-chip {
    flex: 1; text-align: center; padding: 10px 6px;
    border-radius: 8px; font-size: 13px; font-weight: 700;
    background: #f0fdf4; color: #15803d;
    border: 1px solid #bbf7d0;
  }

  .rp-footer { margin-top: 22px; padding-top: 12px; border-top: 1px solid #eee; display: flex; justify-content: space-between; align-items: center; }
  .rp-footer-note { font-size: 10px; color: #bbb; line-height: 1.5; }
  .rp-print-btn {
    padding: 8px 20px; border-radius: 999px;
    background: #7c3aed; color: #fff;
    border: none; cursor: pointer; font-size: 12px;
    font-family: inherit; font-weight: 500;
  }
  .rp-print-btn:hover { background: #6d28d9; }

  /* ── 인쇄 전용 ── */
  @media print {
    body * { visibility: hidden; }
    #reportOverlay, #reportOverlay * { visibility: visible; }
    #reportOverlay {
      position: static; background: none; padding: 0; overflow: visible;
    }
    .report-sheet {
      box-shadow: none; border-radius: 0;
      max-width: 100%; padding: 20mm 18mm;
      page-break-inside: avoid;
    }
    .report-close, .rp-print-btn, .report-overlay-close { display: none !important; }
  }
</style>
</head>
<body>
<div class="glow"></div>

<!-- INTRO -->
<div id="intro" class="screen active">
  <div class="intro-inner">
    <div class="logo-mark">MBTI</div>
    <div class="intro-title">성격유형 간략 검사</div>
    <div class="intro-desc">
      <span>20문항</span>으로 당신의 MBTI 유형을 파악합니다.<br><br>
      각 질문에서 <span>더 자연스럽게 느껴지는 쪽</span>을 선택하세요.
      정답은 없으며, 평소 자신의 모습을 기준으로 답해주세요.<br><br>
      소요시간: <span>약 4~5분</span>
    </div>
    <button class="start-btn" onclick="startQuiz()">
      검사 시작하기
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M5 12h14M12 5l7 7-7 7"/></svg>
    </button>
  </div>
</div>

<!-- QUIZ -->
<div id="quiz-screen" class="screen">
  <div class="quiz-header">
    <div class="quiz-header-inner">
      <span class="q-counter" id="qCounter">0 / 20</span>
      <div class="prog-track"><div class="prog-fill" id="progFill"></div></div>
    </div>
  </div>
  <div class="quiz-body" id="quizBody"></div>
  <div class="submit-wrap">
    <button class="submit-btn" id="submitBtn" onclick="showResult()">결과 확인하기 →</button>
  </div>
</div>

<!-- RESULT -->
<div id="result-screen" class="screen">
  <div class="result-inner" id="resultInner"></div>
</div>

<!-- REPORT OVERLAY -->
<div id="reportOverlay">
  <div class="report-sheet" id="reportSheet">
    <button class="report-close" onclick="closeReport()">✕</button>
    <div id="reportContent"></div>
  </div>
</div>

<script>
const Qs = [
  /* E / I — 5문항 */
  { dim:'EI', section:'E / I', q:'주말에 에너지를 회복하는 방식은?', a:'사람들과 만나거나 활동적인 모임에 나간다', b:'혼자 조용히 쉬거나 소수와 조용히 시간을 보낸다' },
  { dim:'EI', q:'새로운 사람을 만날 때 나는?', a:'먼저 다가가서 말을 건네는 편이다', b:'상대방이 먼저 다가오길 기다리는 편이다' },
  { dim:'EI', q:'무언가 고민이 생기면?', a:'누군가에게 이야기하며 생각을 정리한다', b:'혼자 깊이 생각한 뒤 정리되면 이야기한다' },
  { dim:'EI', q:'모임이나 파티가 끝난 후 나는?', a:'더 활기차고 기분이 좋아진다', b:'피곤하고 혼자만의 시간이 필요하다' },
  { dim:'EI', q:'일할 때 선호하는 환경은?', a:'사람들과 함께 대화하며 협력하는 환경', b:'조용한 공간에서 혼자 집중하는 환경' },

  /* S / N — 5문항 */
  { dim:'SN', section:'S / N', q:'새 프로젝트를 시작할 때 먼저 생각하는 것은?', a:'구체적인 단계와 실행 가능한 계획', b:'전체적인 방향성과 가능성, 큰 그림' },
  { dim:'SN', q:'정보를 받아들일 때 더 신뢰하는 것은?', a:'직접 경험하거나 확인된 구체적 사실', b:'패턴, 직감, 개념 간의 연결' },

const answers = {};
let renderedSections = new Set();

function startQuiz() {
  show('quiz-screen');
  renderQuestions();
}

function show(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  window.scrollTo(0, 0);
}

function renderQuestions() {
  const body = document.getElementById('quizBody');
  body.innerHTML = '';
  renderedSections.clear();
  Qs.forEach((q, i) => {
    if (q.section && !renderedSections.has(q.section)) {
      renderedSections.add(q.section);
      const badge = document.createElement('div');
      badge.className = `section-badge badge-${q.dim}`;
      badge.textContent = q.section;
      if (i > 0) badge.style.marginTop = '2rem';
      body.appendChild(badge);
    }
    const card = document.createElement('div');
    card.className = 'q-card';
    card.style.animationDelay = (i * 0.04) + 's';
    const sel = answers[i];
    card.innerHTML = `
      <div class="q-num">Q ${i+1}</div>
      <div class="q-text">${q.q}</div>
      <div class="opts">
        <button class="opt ${sel==='a'?'sel-a':''}" onclick="pick(${i},'a')">A.  ${q.a}</button>
        <button class="opt ${sel==='b'?'sel-b':''}" onclick="pick(${i},'b')">B.  ${q.b}</button>
      </div>`;
    body.appendChild(card);
  });
}

function pick(i, ch) {
  answers[i] = ch;
  const cards = document.querySelectorAll('.q-card');
  const btns = cards[i].querySelectorAll('.opt');
  btns[0].className = 'opt' + (ch==='a' ? ' sel-a' : '');
  btns[1].className = 'opt' + (ch==='b' ? ' sel-b' : '');
  const count = Object.keys(answers).length;
  document.getElementById('qCounter').textContent = count + ' / 20';
  document.getElementById('progFill').style.width = (count / 20 * 100) + '%';
  const sb = document.getElementById('submitBtn');
  sb.style.display = count === 20 ? 'block' : 'none';
}

function restart() {
  Object.keys(answers).forEach(k => delete answers[k]);
  show('quiz-screen');
  renderQuestions();
  document.getElementById('qCounter').textContent = '0 / 20';
  document.getElementById('progFill').style.width = '0%';
  document.getElementById('submitBtn').style.display = 'none';
}

    navigator.share({ title: 'MBTI 검사 결과', text });

    navigator.clipboard.writeText(text).then(() => alert('결과가 클립보드에 복사되었습니다!'));
  } else {
    alert(text);
  }
}

    INFP:'진정성 있는 연결을 소중히 여깁니다. 가치관을 공유하는 사람들과 깊은 유대를 형성하며, 공감과 이해를 바탕으로 관계를 이어갑니다. 갈등 상황에서는 솔직한 표현이 관계를 더 단단하게 합니다.',

    ISFJ:'배려심 깊고 헌신적인 파트너입니다. 상대의 필요를 세심하게 파악하고 조용히 지원합니다. 자신의 욕구와 의견도 표현하는 연습이 더 균형 잡힌 관계를 만듭니다.',

    ISFP:'온화하고 수용적이며 조용히 상대를 배려합니다. 진정성 있는 방식으로 관계를 맺고 갈등을 피하는 경향이 있습니다. 자신의 필요와 경계를 표현하는 것이 건강한 관계의 핵심입니다.',
    ESTP:'에너지 넘치고 즉흥적인 상호작용을 즐기며 사람들과 빠르게 친해집니다. 현재의 즐거움을 함께 나누는 관계를 선호하며, 장기적 감정적 연결을 위한 깊이 있는 소통도 중요합니다.',
    ESFP:'사람들과 함께하는 순간에 활기를 얻으며 분위기를 밝게 만듭니다. 즉흥적이고 관대한 성격으로 폭넓은 인간관계를 유지합니다. 감정의 깊이와 일관성 있는 연결이 장기적 유대를 강화합니다.',
  };
  return descs[type] || '다양한 사람들과 진정성 있는 관계를 맺으며 상호 성장하는 것을 소중히 여깁니다.';
}

  </table>

  <!-- 대인관계 -->
  <div style="margin-bottom:18px">
    <div style="font-size:10px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:#7c3aed;border-left:3px solid #7c3aed;padding-left:8px;margin-bottom:8px">대인관계 특성</div>
    <div style="font-size:12px;color:#444;line-height:1.85;background:#faf8ff;border-radius:8px;padding:12px">${getRelationDesc(type)}</div>
  </div>

  <!-- 잘 맞는 유형 -->
  <div style="margin-bottom:18px">
    <div style="font-size:10px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:#7c3aed;border-left:3px solid #7c3aed;padding-left:8px;margin-bottom:8px">잘 맞는 유형</div>
    <table style="border-collapse:collapse;width:100%"><tr>
      ${(info.compat||[]).map(t=>`<td style="text-align:center;padding:10px 4px"><div style="background:#f0fdf4;color:#15803d;font-weight:700;font-size:14px;border:1px solid #bbf7d0;border-radius:8px;padding:10px">${t}</div></td>`).join('')}
    </tr></table>
  </div>

  <div style="margin-top:20px;padding-top:12px;border-top:1px solid #eee;font-size:10px;color:#bbb;line-height:1.55">
    본 해석지는 20문항 간략 검사 결과입니다. 정확한 유형 파악은 공식 MBTI 검사를 권장합니다.
  </div>
</div>`;

  const btn = document.getElementById('sendBtn');
  const msg = document.getElementById('sendMsg');
  btn.textContent = '발송 중...';
  btn.disabled = true;

  emailjs.send(EJS_SERVICE, EJS_TEMPLATE, {
    subject: `[MBTI] ${name} · ${phone} — ${type} ${info.nick||''}`,
    html_content: html,
    from_name: name,
    to_email: 'garamchoi1091@gmail.com',
  }).then(() => {
    btn.style.display = 'none';
    msg.style.display = 'block';
    msg.innerHTML = `<div style="background:rgba(34,197,94,0.1);border:1px solid rgba(34,197,94,0.3);border-radius:10px;padding:1.25rem">
      <div style="font-size:22px;margin-bottom:8px">✅</div>
      <div style="font-size:17px;font-weight:500;color:#4ade80;margin-bottom:6px">전송 완료!</div>
      <div style="font-size:15px;color:var(--text2);line-height:1.7">
        <strong style="color:var(--text)">${name}</strong>님의 검사 결과가 전문가에게 전달되었습니다.<br>
        입력하신 번호 <strong style="color:var(--text)">${phone}</strong>로 곧 연락드릴 예정입니다.
      </div>
    </div>`;
    document.getElementById('inputName').disabled = true;
    document.getElementById('inputPhone').disabled = true;
  }).catch(err => {
    console.error(err);
    btn.textContent = '📧 결과 분석 요청하기';
    btn.disabled = false;
    msg.style.display = 'block';
    msg.innerHTML = `<div style="color:#f87171;font-size:13px">발송에 실패했습니다. 잠시 후 다시 시도해 주세요.</div>`;
  });
}
</script>
<script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>
<script>emailjs.init('P8vFkuGZ8hRJeeJb5');</script>
</body>
</html>
